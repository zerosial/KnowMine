version: '3.9'

services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: knowmine-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/chromadb:/app/data/chromadb
      - ./data/uploads:/app/uploads
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: knowmine-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  chromadb_data:
